<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .title { font: 700 34px sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px sans-serif; fill: #4b5563; }
      .box-title { font: 700 24px sans-serif; fill: #111827; }
      .label { font: 600 16px sans-serif; fill: #111827; }
      .small { font: 500 14px sans-serif; fill: #374151; }
      .pin { font: 600 14px monospace; fill: #111827; }
      .note { font: 500 15px sans-serif; fill: #374151; }
      .board { fill: #f8fafc; stroke: #1f2937; stroke-width: 3; rx: 18; }
      .module { fill: #ffffff; stroke: #334155; stroke-width: 2.5; rx: 18; }
      .rail3v3 { stroke: #dc2626; stroke-width: 4; fill: none; }
      .railgnd { stroke: #111827; stroke-width: 4; fill: none; }
      .i2c { stroke: #2563eb; stroke-width: 4; fill: none; }
      .spi { stroke: #7c3aed; stroke-width: 4; fill: none; }
      .i2s { stroke: #059669; stroke-width: 4; fill: none; }
      .gpio { stroke: #ea580c; stroke-width: 4; fill: none; }
      .analog { stroke: #0891b2; stroke-width: 4; fill: none; }
      .legend { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="#f1f5f9"/>
  <text x="70" y="60" class="title">RoamBro Wiring Diagram</text>
  <text x="70" y="92" class="subtitle">Based on the pin definitions and hardware list in RoamBro.ino</text>

  <rect x="650" y="150" width="500" height="760" class="board"/>
  <text x="820" y="190" class="box-title">Waveshare RP2350 Zero</text>
  <text x="705" y="225" class="small">Main controller</text>

  <text x="690" y="270" class="pin">3V3</text>
  <text x="690" y="300" class="pin">GND</text>
  <text x="690" y="350" class="pin">GPIO 2  - SD CLK</text>
  <text x="690" y="380" class="pin">GPIO 3  - SD MOSI</text>
  <text x="690" y="410" class="pin">GPIO 4  - SD MISO</text>
  <text x="690" y="440" class="pin">GPIO 5  - SD CS</text>
  <text x="690" y="490" class="pin">GPIO 8  - I2C SDA</text>
  <text x="690" y="520" class="pin">GPIO 9  - I2C SCL</text>
  <text x="690" y="570" class="pin">GPIO 10 - I2S BCLK</text>
  <text x="690" y="600" class="pin">GPIO 11 - I2S LRCLK</text>
  <text x="690" y="630" class="pin">GPIO 12 - I2S DOUT</text>

  <text x="690" y="700" class="pin">GPIO 26 - Volume pot wiper</text>
  <text x="690" y="730" class="pin">GPIO 27 - Play/Pause button</text>
  <text x="690" y="760" class="pin">GPIO 28 - Previous button</text>
  <text x="690" y="790" class="pin">GPIO 29 - Next button</text>
  <text x="690" y="820" class="pin">GPIO 7  - Function button</text>
  <text x="690" y="850" class="pin">GPIO 6  - LED</text>

  <rect x="80" y="160" width="360" height="220" class="module"/>
  <text x="185" y="200" class="box-title">PN532 NFC Reader</text>
  <text x="120" y="245" class="pin">VCC</text>
  <text x="120" y="275" class="pin">GND</text>
  <text x="120" y="305" class="pin">SDA</text>
  <text x="120" y="335" class="pin">SCL</text>
  <text x="120" y="360" class="small">Configure module for I2C mode</text>

  <rect x="80" y="470" width="360" height="270" class="module"/>
  <text x="155" y="510" class="box-title">MicroSD Module</text>
  <text x="120" y="555" class="pin">VCC</text>
  <text x="120" y="585" class="pin">GND</text>
  <text x="120" y="615" class="pin">SCK</text>
  <text x="120" y="645" class="pin">MOSI</text>
  <text x="120" y="675" class="pin">MISO</text>
  <text x="120" y="705" class="pin">CS</text>
  <text x="120" y="730" class="small">SPI bus at GPIO 2/3/4/5</text>

  <rect x="1320" y="170" width="380" height="260" class="module"/>
  <text x="1435" y="210" class="box-title">PCM5102 DAC</text>
  <text x="1360" y="255" class="pin">VIN / 3V3</text>
  <text x="1360" y="285" class="pin">GND</text>
  <text x="1360" y="315" class="pin">BCK</text>
  <text x="1360" y="345" class="pin">LCK / WS</text>
  <text x="1360" y="375" class="pin">DIN</text>
  <text x="1360" y="405" class="small">Analog L/R outputs to amp or headphones</text>

  <rect x="1290" y="500" width="430" height="160" class="module"/>
  <text x="1410" y="540" class="box-title">10K Volume Potentiometer</text>
  <text x="1330" y="585" class="pin">One outer leg -> 3V3</text>
  <text x="1330" y="615" class="pin">Other outer leg -> GND</text>
  <text x="1330" y="645" class="pin">Center wiper -> GPIO 26</text>

  <rect x="1260" y="730" width="500" height="300" class="module"/>
  <text x="1435" y="770" class="box-title">Controls and LED</text>

  <text x="1300" y="820" class="pin">Play/Pause button: GPIO 27 -> momentary switch -> GND</text>
  <text x="1300" y="860" class="pin">Previous button: GPIO 28 -> momentary switch -> GND</text>
  <text x="1300" y="900" class="pin">Next button: GPIO 29 -> momentary switch -> GND</text>
  <text x="1300" y="940" class="pin">Function button: GPIO 7 -> momentary switch -> GND</text>
  <text x="1300" y="980" class="pin">LED: GPIO 6 -> resistor -> LED anode, LED cathode -> GND</text>
  <text x="1300" y="1010" class="small">Buttons use INPUT_PULLUP in code</text>

  <path d="M 650 260 L 520 260 L 520 245 L 440 245" class="rail3v3"/>
  <path d="M 650 290 L 550 290 L 550 275 L 440 275" class="railgnd"/>
  <path d="M 650 490 L 520 490 L 520 305 L 440 305" class="i2c"/>
  <path d="M 650 520 L 550 520 L 550 335 L 440 335" class="i2c"/>

  <path d="M 650 260 L 500 260 L 500 555 L 440 555" class="rail3v3"/>
  <path d="M 650 290 L 530 290 L 530 585 L 440 585" class="railgnd"/>
  <path d="M 650 350 L 540 350 L 540 615 L 440 615" class="spi"/>
  <path d="M 650 380 L 565 380 L 565 645 L 440 645" class="spi"/>
  <path d="M 650 410 L 590 410 L 590 675 L 440 675" class="spi"/>
  <path d="M 650 440 L 615 440 L 615 705 L 440 705" class="spi"/>

  <path d="M 1150 260 L 1240 260 L 1240 255 L 1360 255" class="rail3v3"/>
  <path d="M 1150 290 L 1220 290 L 1220 285 L 1360 285" class="railgnd"/>
  <path d="M 1150 570 L 1240 570 L 1240 315 L 1360 315" class="i2s"/>
  <path d="M 1150 600 L 1260 600 L 1260 345 L 1360 345" class="i2s"/>
  <path d="M 1150 630 L 1280 630 L 1280 375 L 1360 375" class="i2s"/>

  <path d="M 1150 260 L 1260 260 L 1260 585 L 1330 585" class="rail3v3"/>
  <path d="M 1150 290 L 1240 290 L 1240 615 L 1330 615" class="railgnd"/>
  <path d="M 1150 700 L 1280 700 L 1280 645 L 1330 645" class="analog"/>

  <path d="M 1150 730 L 1220 730 L 1220 820 L 1290 820" class="gpio"/>
  <path d="M 1150 760 L 1210 760 L 1210 860 L 1290 860" class="gpio"/>
  <path d="M 1150 790 L 1200 790 L 1200 900 L 1290 900" class="gpio"/>
  <path d="M 1150 820 L 1190 820 L 1190 940 L 1290 940" class="gpio"/>
  <path d="M 1150 850 L 1180 850 L 1180 980 L 1290 980" class="gpio"/>

  <rect x="70" y="1020" width="760" height="130" class="legend"/>
  <text x="95" y="1058" class="box-title">Legend</text>
  <line x1="100" y1="1090" x2="180" y2="1090" class="rail3v3"/>
  <text x="195" y="1096" class="label">3.3V power</text>
  <line x1="320" y1="1090" x2="400" y2="1090" class="railgnd"/>
  <text x="415" y="1096" class="label">Ground</text>
  <line x1="520" y1="1090" x2="600" y2="1090" class="i2c"/>
  <text x="615" y="1096" class="label">I2C</text>
  <line x1="100" y1="1125" x2="180" y2="1125" class="spi"/>
  <text x="195" y="1131" class="label">SPI</text>
  <line x1="320" y1="1125" x2="400" y2="1125" class="i2s"/>
  <text x="415" y="1131" class="label">I2S audio</text>
  <line x1="520" y1="1125" x2="600" y2="1125" class="gpio"/>
  <text x="615" y="1131" class="label">GPIO / buttons / LED</text>

  <rect x="890" y="1020" width="840" height="130" class="legend"/>
  <text x="915" y="1058" class="box-title">Notes</text>
  <text x="915" y="1090" class="note">1. All grounds must be common.</text>
  <text x="915" y="1118" class="note">2. Use a suitable series resistor for the LED, typically 220R to 1K.</text>
  <text x="915" y="1146" class="note">3. Verify your specific PN532 and PCM5102 module pin labels before wiring.</text>
</svg>
