<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoamBro Wiring Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111827;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 48px;
    font-family: 'Share Tech Mono', monospace;
  }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e0f0ff;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 11px;
    color: #5577aa;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }
  .diagram-wrap {
    background: #111827;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    box-shadow: 0 0 60px rgba(30,80,160,0.25), 0 0 120px rgba(10,30,80,0.4);
  }
  svg { display: block; }
  .legend {
    margin-top: 20px;
    display: flex;
    gap: 22px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #7799bb;
    letter-spacing: 1px;
  }
  .legend-swatch { width: 28px; height: 3px; border-radius: 2px; }
  .wire-shadow {
    fill: none;
    stroke: #08101d;
    stroke-width: 4.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.95;
  }
  .wire {
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
<h1>RoamBro</h1>
<div class="subtitle">WAVESHARE RP2350 ZERO · TAPE EMULATOR · WIRING DIAGRAM</div>
<div class="diagram-wrap">
<svg width="1120" height="860" viewBox="0 0 1120 860" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M20 0L0 0 0 20" fill="none" stroke="#161f35" stroke-width="0.5"/>
  </pattern>
  <filter id="shadow">
    <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.65"/>
  </filter>
  <filter id="led-glow">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <circle id="pin"    r="3.5" fill="#c8a84b" stroke="#7a6010" stroke-width="1"/>
  <circle id="pin-sm" r="2.5" fill="#c8a84b" stroke="#7a6010" stroke-width="0.8"/>
</defs>

<!-- Background -->
<rect width="1120" height="860" fill="#111827"/>
<rect width="1120" height="860" fill="url(#grid)"/>
<radialGradient id="vig" cx="50%" cy="50%" r="70%">
  <stop offset="0%" stop-color="transparent"/>
  <stop offset="100%" stop-color="#060c1a" stop-opacity="0.7"/>
</radialGradient>
<rect width="1120" height="860" fill="url(#vig)"/>
